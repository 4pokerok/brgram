services:
  redpanda:
    image: redpandadata/redpanda:latest
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - '1'
      - --memory
      - '1G'
      - --reserve-memory
      - '0M'
      - --node-id
      - '0'
      - --check=false
      - --kafka-addr
      - 'PLAINTEXT://0.0.0.0:9092'
      - --advertise-kafka-addr
      - 'PLAINTEXT://localhost:9092'
    ports:
      - '9092:9092'
      - '9644:9644'

  redpanda-console:
    image: redpandadata/console:latest
    environment:
      KAFKA_BROKERS: redpanda:9092
    ports:
      - '8081:8080'
    depends_on:
      - redpanda
